<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0d5c3a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Drankbeheer" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<title>Drankbeheer — Vrijetijd Moorslede</title>
<style>
:root{--groen:#0d5c3a;--groen-donker:#0a4a2f;--groen-zacht:#e7efe9;--ink:#1b2420;--muted:#6b7770;--bg:#f5f6f4;--surface:#fff;--lijn:#e6e7e2;--rood:#b3402f;--radius:14px;--schaduw:0 1px 2px rgba(27,36,32,.05),0 8px 24px rgba(27,36,32,.05);--sidebar-b:248px;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit}.verborgen{display:none!important}
.logo{display:inline-grid;place-items:center;flex-shrink:0;width:40px;height:40px;border-radius:11px;background:var(--groen);color:#fff;font-weight:700;font-size:1.15rem}
.center{min-height:100dvh;display:grid;place-items:center;padding:20px}
.kaart{background:var(--surface);border:1px solid var(--lijn);border-radius:var(--radius);box-shadow:var(--schaduw);padding:32px;width:100%;max-width:380px}
.kaart h1{font-size:1.35rem;font-weight:700;margin:0 0 2px}.kaart .sub{color:var(--muted);margin:0 0 18px;font-size:.9rem}
label{display:block;font-size:.82rem;font-weight:600;margin:14px 0 6px}
input,select{width:100%;padding:11px 13px;font-size:1rem;font-family:inherit;border:1px solid var(--lijn);border-radius:10px;background:#fff;color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--groen);border-color:var(--groen)}
.knop{width:100%;margin-top:20px;padding:12px;background:var(--groen);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.knop:hover{background:var(--groen-donker)}.knop.secundair{background:var(--groen-zacht);color:var(--groen-donker);width:auto;margin-top:0}
.fout{color:var(--rood);font-size:.85rem;margin-top:12px;min-height:1.2em}
.melding{color:var(--groen-donker);font-size:.88rem;margin-top:12px}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-b);background:var(--surface);border-right:1px solid var(--lijn);display:flex;flex-direction:column;padding:20px 14px;z-index:40}
.merk{display:flex;align-items:center;gap:11px;padding:4px 8px 20px}
.merk-titel{font-weight:700;font-size:1.05rem}.merk-sub{font-size:.76rem;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.nav-sectie{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:16px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;border:none;background:none;border-radius:10px;font-size:.92rem;font-weight:500;color:var(--ink);cursor:pointer;text-align:left}
.nav-item:hover{background:var(--bg)}.nav-item.actief{background:var(--groen-zacht);color:var(--groen-donker);font-weight:600}
.nav-item svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0;opacity:.85}
.nav-item.actief svg{opacity:1}
.sidebar-voet{border-top:1px solid var(--lijn);padding-top:14px;margin-top:10px}
.user{display:flex;align-items:center;gap:10px;padding:0 6px 12px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--groen-zacht);color:var(--groen-donker);display:grid;place-items:center;font-weight:700;font-size:.85rem}
.user-naam{font-size:.88rem;font-weight:600}.user-rol{font-size:.74rem;color:var(--muted);text-transform:capitalize}
.afmeld{width:100%;padding:9px;background:none;border:1px solid var(--lijn);border-radius:9px;font-size:.86rem;color:var(--muted);cursor:pointer}
.afmeld:hover{border-color:var(--rood);color:var(--rood)}
.hoofd{margin-left:var(--sidebar-b);min-height:100dvh}.mobiel-top{display:none}
.inhoud{max-width:960px;margin:0 auto;padding:32px 28px 64px}
.inhoud.breed{max-width:1180px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30}
.welkom-blok{margin-bottom:26px}.welkom-blok h1{font-size:1.6rem;font-weight:700;margin:0 0 4px}.welkom-blok p{color:var(--muted);margin:0}
.sectie-titel{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:30px 0 12px}
.blokken{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.blok{text-align:left;background:var(--surface);border:1px solid var(--lijn);border-radius:var(--radius);padding:18px;cursor:pointer;box-shadow:var(--schaduw);display:flex;flex-direction:column;gap:8px}
.blok:hover{border-color:var(--groen)}
.blok .blok-icoon{width:40px;height:40px;border-radius:11px;background:var(--groen-zacht);color:var(--groen-donker);display:grid;place-items:center}
.blok .blok-icoon svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none}
.blok .blok-titel{font-weight:600}
.info-kaart{background:var(--surface);border:1px solid var(--lijn);border-radius:var(--radius);box-shadow:var(--schaduw);padding:18px}
.info-leeg{color:var(--muted);font-size:.9rem}
.reg-rij{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--lijn);font-size:.9rem}
.reg-rij:last-child{border-bottom:none}.reg-rij .re-sub{color:var(--muted);font-size:.8rem}
.pagina-kop{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.pagina-kop h1{font-size:1.4rem;font-weight:700;margin:0}
.veldrij{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kolomkop{display:grid;grid-template-columns:1fr 90px;gap:8px;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;padding-bottom:6px}
.product{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--lijn)}
.product .naam{font-size:.92rem}.product .cat{font-size:.72rem;color:var(--muted)}
.product input{padding:9px;text-align:center}
.mens{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--lijn)}
.mens .acties{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.mini{padding:6px 12px;border-radius:8px;border:1px solid var(--lijn);background:#fff;font-size:.8rem;font-family:inherit;cursor:pointer;color:var(--ink)}
.mini.toggle{background:var(--groen-zacht);border-color:var(--groen-zacht);color:var(--groen-donker);font-weight:600}
.mini.gevaar:hover{border-color:var(--rood);color:var(--rood)}
.placeholder{background:#fbf1df;border:1px solid #eedfc4;border-radius:var(--radius);padding:18px;color:#7a5512}
.locsectie{margin:26px 0}
.locsectie-titel{font-weight:700;color:var(--groen-donker);margin-bottom:4px;font-size:1rem}
.locsectie-uitleg{font-size:.82rem;color:var(--muted);margin-bottom:14px}
.matrix-wrap{overflow-x:auto;border:1px solid var(--lijn);border-radius:10px}
table.matrix{border-collapse:collapse;width:100%;font-size:.85rem}
table.matrix td,table.matrix th{padding:7px 10px;border-bottom:1px solid var(--lijn);text-align:center;white-space:nowrap}
table.matrix th{background:var(--bg);font-weight:600}
table.matrix td:first-child,table.matrix th:first-child{text-align:left;position:sticky;left:0;background:var(--surface);min-width:220px}
table.matrix th:first-child{background:var(--bg)}
table.matrix .prijsinput{width:60px;padding:4px;text-align:right;font-size:.78rem}
table.matrix .bakinput{width:48px;padding:4px;text-align:center;font-size:.78rem}
table.matrix select.statusselect{width:120px;padding:4px;font-size:.78rem}
.crate-row{display:grid;grid-template-columns:1fr 80px 80px 70px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--lijn)}
.crate-head{display:grid;grid-template-columns:1fr 80px 80px 70px;gap:8px;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;padding-bottom:6px}
.crate-row input{padding:7px;text-align:center}
.crate-totaal{font-size:.78rem;color:var(--muted);text-align:center}
.gebouw-kaart{background:var(--surface);border:1px solid var(--lijn);border-radius:var(--radius);box-shadow:var(--schaduw);padding:16px 18px;margin-bottom:14px}
.gebouw-kop{display:flex;justify-content:space-between;align-items:center}
.gebouw-naam{font-weight:600;font-size:1rem}
.zaal-lijst{margin-top:10px;padding-top:10px;border-top:1px solid var(--lijn)}
.zaal-rij{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.88rem}
@media (max-width:820px){
.sidebar{transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 40px rgba(0,0,0,.15)}
.sidebar.open{transform:translateX(0)}.hoofd{margin-left:0}
.mobiel-top{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--groen);color:#fff;position:sticky;top:0;z-index:20}
.hamburger{background:rgba(255,255,255,.15);color:#fff;border:none;width:38px;height:38px;border-radius:9px;font-size:1.2rem;cursor:pointer}
.overlay.open{display:block}.inhoud{padding:22px 18px 60px}.veldrij{grid-template-columns:1fr}
.crate-row,.crate-head{grid-template-columns:1fr 60px 60px 55px}
}
</style>
</head>
<body>
<div id="login" class="center">
  <div class="kaart">
    <div class="logo" style="margin-bottom:14px">D</div>
    <h1>Drankbeheer</h1>
    <p class="sub">Vrijetijd Moorslede</p>
    <label for="email">E-mail</label>
    <input id="email" type="email" autocomplete="username" inputmode="email" />
    <label for="pin">Pincode</label>
    <input id="pin" type="password" autocomplete="current-password" />
    <button id="login-knop" class="knop">Aanmelden</button>
    <div id="login-fout" class="fout"></div>
  </div>
</div>

<div id="app" class="verborgen">
  <aside id="sidebar" class="sidebar">
    <div class="merk">
      <span class="logo">D</span>
      <div><div class="merk-titel">Drankbeheer</div><div class="merk-sub">Vrijetijd Moorslede</div></div>
    </div>
    <nav id="nav" class="nav"></nav>
    <div class="sidebar-voet">
      <div class="user">
        <div class="user-avatar" id="u-avatar"></div>
        <div><div class="user-naam" id="u-naam"></div><div class="user-rol" id="u-rol"></div></div>
      </div>
      <button id="afmelden" class="afmeld">Afmelden</button>
    </div>
  </aside>
  <div id="overlay" class="overlay"></div>
  <div class="hoofd">
    <header class="mobiel-top">
      <button id="menu-knop" class="hamburger" aria-label="Menu">&#9776;</button>
      <span>Drankbeheer</span>
    </header>
    <main class="inhoud" id="inhoud"></main>
  </div>
</div>

<script>
const ICONS = {
  overzicht: '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  telling: '<svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 3.5h6v3H9z"/><path d="M8.5 11h7M8.5 15h4.5"/></svg>',
  levering: '<svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="11" height="9" rx="1"/><path d="M13.5 9h4l3 3v3h-7z"/><circle cx="6.5" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/></svg>',
  intern: '<svg viewBox="0 0 24 24"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/></svg>',
  controle: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-4-4"/></svg>',
  facturatie: '<svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>',
  mensen: '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>',
  config: '<svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>',
  gebouwen: '<svg viewBox="0 0 24 24"><path d="M4 21V7l8-4 8 4v14"/><path d="M9 21v-6h6v6M9 11h.01M15 11h.01M9 15h.01M15 15h.01"/></svg>',
};
const TOEGANG = {
  telling: ["beheerder","personeel"], levering: ["beheerder","personeel"],
  intern: ["beheerder","personeel"], controle: ["beheerder","personeel"],
  facturatie: ["beheerder","personeel"], beheer: ["beheerder"],
};
const NAV = [
  { key: "overzicht", actie: null, titel: "Overzicht", icoon: "overzicht", view: overzicht },
  { key: "telling", actie: "telling", titel: "Telling vóór", icoon: "telling", view: tellingVoor },
  { key: "telling_na", actie: "telling", titel: "Telling ná", icoon: "telling", view: nogTeBouwen },
  { key: "levering", actie: "levering", titel: "Levering", icoon: "levering", view: nogTeBouwen },
  { key: "intern", actie: "intern", titel: "Intern gebruik", icoon: "intern", view: nogTeBouwen },
  { key: "controle", actie: "controle", titel: "Controletelling", icoon: "controle", view: nogTeBouwen },
  { key: "facturatie", actie: "facturatie", titel: "Pre-facturatie", icoon: "facturatie", view: nogTeBouwen },
  { key: "beheer_mensen", actie: "beheer", titel: "Medewerkers", icoon: "mensen", sectie: "Beheer", view: paginaMensen },
  { key: "beheer_config", actie: "beheer", titel: "Drankconfiguratie", icoon: "config", sectie: "Beheer", view: paginaDrankconfig, breed: true },
  { key: "beheer_gebouwen", actie: "beheer", titel: "Gebouwen & zalen", icoon: "gebouwen", sectie: "Beheer", view: paginaGebouwen },
];

let huidige = null;
const $ = (id) => document.getElementById(id);
const el = (h) => { const t = document.createElement("template"); t.innerHTML = h.trim(); return t.content.firstChild; };
const mag = (a) => !a || (huidige && (TOEGANG[a] || []).includes(huidige.rol));

async function api(pad, opties = {}) {
  const res = await fetch(pad, { headers: { "content-type": "application/json" }, ...opties });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.fout || "Er ging iets mis.");
  return data;
}

(async function start() {
  try { huidige = await api("/api/me"); toonApp(); } catch {}
})();

$("login-knop").addEventListener("click", async () => {
  $("login-fout").textContent = "";
  try {
    huidige = await api("/api/login", { method: "POST", body: JSON.stringify({ email: $("email").value, pin: $("pin").value }) });
    toonApp();
  } catch (e) { $("login-fout").textContent = e.message; }
});
$("pin").addEventListener("keydown", (e) => { if (e.key === "Enter") $("login-knop").click(); });

function toonApp() {
  $("login").classList.add("verborgen");
  $("app").classList.remove("verborgen");
  $("u-naam").textContent = huidige.naam;
  $("u-rol").textContent = huidige.rol;
  $("u-avatar").textContent = huidige.naam.split(" ").map((w) => w[0]).slice(0, 2).join("").toUpperCase();
  bouwNav();
  ga("overzicht");
}

$("afmelden").addEventListener("click", async () => { await api("/api/logout", { method: "POST" }); location.reload(); });
$("menu-knop").addEventListener("click", () => { $("sidebar").classList.add("open"); $("overlay").classList.add("open"); });
$("overlay").addEventListener("click", sluitMenu);
function sluitMenu() { $("sidebar").classList.remove("open"); $("overlay").classList.remove("open"); }

function bouwNav() {
  const nav = $("nav"); nav.innerHTML = "";
  let laatsteSectie = null;
  for (const item of NAV) {
    if (!mag(item.actie)) continue;
    if (item.sectie && item.sectie !== laatsteSectie) {
      nav.appendChild(el(`<div class="nav-sectie">${item.sectie}</div>`));
      laatsteSectie = item.sectie;
    }
    const b = el(`<button class="nav-item" data-key="${item.key}">${ICONS[item.icoon] || ""}<span>${item.titel}</span></button>`);
    b.addEventListener("click", () => ga(item.key));
    nav.appendChild(b);
  }
}
function ga(key) {
  const item = NAV.find((n) => n.key === key);
  if (!item || !mag(item.actie)) return;
  document.querySelectorAll(".nav-item").forEach((n) => n.classList.toggle("actief", n.dataset.key === key));
  sluitMenu();
  const inhoud = $("inhoud");
  inhoud.innerHTML = "";
  inhoud.classList.toggle("breed", !!item.breed);
  item.view();
}

// ---------- Overzicht ----------
async function overzicht() {
  const c = $("inhoud");
  const uur = new Date().getHours();
  const groet = uur < 12 ? "Goeiemorgen" : uur < 18 ? "Goeiemiddag" : "Goeieavond";
  c.appendChild(el(`<div class="welkom-blok"><h1>${groet}, ${huidige.naam.split(" ")[0]} 👋</h1><p>Welkom in de drankbeheer-app van Vrijetijd Moorslede.</p></div>`));
  c.appendChild(el(`<div class="sectie-titel">Aan de slag</div>`));
  const grid = el(`<div class="blokken"></div>`);
  for (const item of NAV) {
    if (item.key === "overzicht" || !mag(item.actie) || item.sectie) continue;
    const b = el(`<button class="blok"><span class="blok-icoon">${ICONS[item.icoon]}</span><span class="blok-titel">${item.titel}</span></button>`);
    b.addEventListener("click", () => ga(item.key));
    grid.appendChild(b);
  }
  c.appendChild(grid);
  c.appendChild(el(`<div class="sectie-titel">Recente registraties</div>`));
  const kaart = el(`<div class="info-kaart"><div class="info-leeg">Laden…</div></div>`);
  c.appendChild(kaart);
  try {
    const { registraties } = await api("/api/registraties");
    if (!registraties.length) { kaart.innerHTML = `<div class="info-leeg">Nog geen registraties. Start met een telling vóór.</div>`; return; }
    kaart.innerHTML = "";
    for (const r of registraties.slice(0, 6)) {
      kaart.appendChild(el(`<div class="reg-rij"><div><div>${r.vereniging || "—"}</div><div class="re-sub">${r.gebouw} · ${r.datum}</div></div><div class="re-sub">${r.status}</div></div>`));
    }
  } catch { kaart.innerHTML = `<div class="info-leeg">Kon registraties niet laden.</div>`; }
}

function paginaKop(titel) { $("inhoud").appendChild(el(`<div class="pagina-kop"><h1>${titel}</h1></div>`)); }

// ---------- Telling vóór ----------
async function tellingVoor() {
  const c = $("inhoud");
  paginaKop("Telling vóór de activiteit");
  const { gebouwen } = await api("/api/gebouwen");
  if (!gebouwen.length) {
    c.appendChild(el(`<div class="info-leeg">Nog geen gebouwen ingesteld. Voeg er een toe via Beheer → Gebouwen &amp; zalen.</div>`));
    return;
  }
  c.appendChild(el(`
    <div>
      <label>Gebouw</label>
      <select id="t-gebouw">${gebouwen.map((g) => `<option>${g}</option>`).join("")}</select>
      <div class="veldrij">
        <div><label>Datum</label><input id="t-datum" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div><label>Zaal</label><div id="t-zaal-wrap"><input id="t-zaal" placeholder="bv. Volledig complex"></div></div>
      </div>
      <label>Vereniging / gebruiker</label><input id="t-vereniging" placeholder="Naam van de huurder">
      <div id="t-inhoud"></div>
      <button id="t-bewaar" class="knop">Telling vóór opslaan</button>
      <div id="t-melding" class="melding"></div>
    </div>`));

  async function laadZalen() {
    try {
      const { zalen } = await api("/api/zalen?gebouw=" + encodeURIComponent($("t-gebouw").value));
      const wrap = $("t-zaal-wrap");
      if (zalen.length) {
        wrap.innerHTML = `<select id="t-zaal">${zalen.map((z) => `<option>${z}</option>`).join("")}<option value="__vrij__">Andere…</option></select>`;
        $("t-zaal").addEventListener("change", (e) => {
          if (e.target.value === "__vrij__") { wrap.innerHTML = `<input id="t-zaal" placeholder="Naam van de zaal">`; }
        });
      } else {
        wrap.innerHTML = `<input id="t-zaal" placeholder="bv. Volledig complex">`;
      }
    } catch { /* laat vrij tekstveld staan */ }
  }

  async function laadProducten() {
    const { producten } = await api("/api/config?gebouw=" + encodeURIComponent($("t-gebouw").value));
    const frigo = producten.filter((p) => p.locatie === "Frigo");
    const overige = producten.filter((p) => p.locatie !== "Frigo");
    const wrap = $("t-inhoud");
    wrap.innerHTML = "";

    if (frigo.length) {
      wrap.appendChild(el(`<div class="locsectie"><div class="locsectie-titel">Frigo</div><div class="locsectie-uitleg">Per stuk tellen.</div></div>`));
      wrap.appendChild(el(`<div class="kolomkop"><span>Drank</span><span>Stand</span></div>`));
      for (const p of frigo) {
        wrap.appendChild(el(`
          <div class="product" data-drank="${encodeURIComponent(p.dranksoort)}" data-modus="stuk">
            <div><div class="naam">${p.dranksoort}</div><div class="cat">${p.categorie || ""}</div></div>
            <input class="stand" type="number" min="0" inputmode="numeric" value="${p.stock}">
          </div>`));
      }
    }
    if (overige.length) {
      wrap.appendChild(el(`<div class="locsectie"><div class="locsectie-titel">Koelcel / drankberging</div><div class="locsectie-uitleg">Tel het aantal volle bakken en de losse flesjes ernaast.</div></div>`));
      wrap.appendChild(el(`<div class="crate-head"><span>Drank</span><span>Bakken</span><span>Los</span><span>Totaal</span></div>`));
      for (const p of overige) {
        const bpb = p.flesjes_per_bak || 24;
        const startBakken = Math.floor(p.stock / bpb);
        const startLos = p.stock % bpb;
        const rij = el(`
          <div class="crate-row" data-drank="${encodeURIComponent(p.dranksoort)}" data-modus="krat" data-bpb="${bpb}">
            <div><div class="naam">${p.dranksoort}</div><div class="cat">${p.categorie || ""}</div></div>
            <input class="bakken" type="number" min="0" inputmode="numeric" value="${startBakken}">
            <input class="los" type="number" min="0" inputmode="numeric" value="${startLos}">
            <div class="crate-totaal">${p.stock}</div>
          </div>`);
        const herbereken = () => {
          const bakken = Number(rij.querySelector(".bakken").value || 0);
          const los = Number(rij.querySelector(".los").value || 0);
          rij.querySelector(".crate-totaal").textContent = bakken * bpb + los;
        };
        rij.querySelector(".bakken").addEventListener("input", herbereken);
        rij.querySelector(".los").addEventListener("input", herbereken);
        wrap.appendChild(rij);
      }
    }
    if (!frigo.length && !overige.length) {
      wrap.appendChild(el(`<div class="info-leeg">Geen dranken beschikbaar voor dit gebouw. Stel dit in via Beheer → Drankconfiguratie.</div>`));
    }
  }

  $("t-gebouw").addEventListener("change", () => { laadZalen(); laadProducten(); });
  await laadZalen();
  await laadProducten();

  $("t-bewaar").addEventListener("click", async () => {
    const regels = [];
    document.querySelectorAll('.product[data-modus="stuk"]').forEach((r) => {
      regels.push({ dranksoort: decodeURIComponent(r.dataset.drank), totaal_voor: Number(r.querySelector(".stand").value || 0) });
    });
    document.querySelectorAll('.crate-row[data-modus="krat"]').forEach((r) => {
      const bpb = Number(r.dataset.bpb);
      const bakken = Number(r.querySelector(".bakken").value || 0);
      const los = Number(r.querySelector(".los").value || 0);
      regels.push({ dranksoort: decodeURIComponent(r.dataset.drank), totaal_voor: bakken * bpb + los });
    });
    try {
      const res = await api("/api/registraties", { method: "POST", body: JSON.stringify({
        fase: "voor", gebouw: $("t-gebouw").value, datum: $("t-datum").value,
        zaal: $("t-zaal").value, vereniging: $("t-vereniging").value, regels,
      })});
      $("t-melding").textContent = `Opgeslagen als ${res.registratie_id}. De voorraad is bijgewerkt.`;
      $("t-bewaar").disabled = true;
    } catch (e) { $("t-melding").textContent = "Fout: " + e.message; }
  });
}

// ---------- Beheer: Medewerkers ----------
async function paginaMensen() {
  const c = $("inhoud");
  paginaKop("Medewerkers");
  c.appendChild(el(`<div id="mensen-lijst">Laden…</div>`));
  const lijst = $("mensen-lijst");
  const { gebruikers } = await api("/api/beheer/gebruikers");
  lijst.innerHTML = "";
  const knop = el(`<button class="knop secundair" style="display:inline-block;padding:9px 16px;margin-bottom:16px">+ Nieuwe medewerker</button>`);
  knop.addEventListener("click", async () => {
    const naam = prompt("Naam?"); if (!naam) return;
    const email = prompt("E-mail?"); if (!email) return;
    const rol = prompt("Rol? (beheerder of personeel)", "personeel"); if (!rol) return;
    const pin = prompt("Tijdelijke pincode?"); if (!pin) return;
    try { await api("/api/beheer/gebruiker", { method: "POST", body: JSON.stringify({ naam, email, rol, pin }) }); paginaMensen(); }
    catch (e) { alert(e.message); }
  });
  lijst.appendChild(knop);
  for (const g of gebruikers) {
    const rij = el(`<div class="mens"><div><div class="naam">${g.naam}</div><div class="cat">${g.email} · ${g.rol}</div></div><div class="acties"><button class="mini wijzig">Wijzig</button><button class="mini pin">PIN</button><button class="mini toggle">${g.actief ? "Actief" : "Uit"}</button></div></div>`);
    rij.querySelector(".wijzig").addEventListener("click", async () => {
      const naam = prompt("Naam?", g.naam); if (!naam) return;
      const email = prompt("E-mail?", g.email); if (!email) return;
      const rol = prompt("Rol? (beheerder of personeel)", g.rol); if (!rol) return;
      try { await api("/api/beheer/gebruiker/wijzig", { method: "PATCH", body: JSON.stringify({ id: g.id, naam, email, rol }) }); paginaMensen(); }
      catch (e) { alert(e.message); }
    });
    rij.querySelector(".pin").addEventListener("click", async () => {
      const nieuwe_pin = prompt(`Nieuwe pincode voor ${g.naam}?`); if (!nieuwe_pin) return;
      try { await api("/api/beheer/gebruiker", { method: "PATCH", body: JSON.stringify({ id: g.id, nieuwe_pin }) }); alert("Pincode gewijzigd."); }
      catch (e) { alert(e.message); }
    });
    rij.querySelector(".toggle").addEventListener("click", async () => {
      try { await api("/api/beheer/gebruiker", { method: "PATCH", body: JSON.stringify({ id: g.id, actief: !g.actief }) }); paginaMensen(); }
      catch (e) { alert(e.message); }
    });
    lijst.appendChild(rij);
  }
}

// ---------- Beheer: Drankconfiguratie ----------
async function paginaDrankconfig() {
  const c = $("inhoud");
  paginaKop("Drankconfiguratie");
  c.appendChild(el(`<p class="locsectie-uitleg">Stel per gebouw in of een drank wordt aangeboden, en zo ja: of die in de Frigo (per stuk) of de Koelcel/Drankberging (per bak) staat. Prijs en bak-grootte gelden voor alle gebouwen samen.</p>`));
  const houder = el(`<div id="config-houder">Laden…</div>`);
  c.appendChild(houder);
  try {
    const { gebouwen, dranken, matrix } = await api("/api/beheer/config");
    if (!gebouwen.length) {
      houder.innerHTML = `<div class="info-leeg">Nog geen gebouwen ingesteld. Voeg er eerst een toe via Beheer → Gebouwen &amp; zalen.</div>`;
      return;
    }
    const statusMap = {};
    matrix.forEach((m) => { statusMap[m.gebouw + "|" + m.dranksoort] = m.actief ? m.locatie : "uit"; });
    houder.innerHTML = "";
    const bycat = {};
    dranken.forEach((d) => { if (!bycat[d.categorie]) bycat[d.categorie] = []; bycat[d.categorie].push(d); });
    for (const cat of Object.keys(bycat).sort()) {
      const catBlok = el(`<div class="locsectie"><div class="locsectie-titel">${cat}</div></div>`);
      const wrapDiv = el(`<div class="matrix-wrap"></div>`);
      const table = el(`<table class="matrix"></table>`);
      table.appendChild(el(`<tr><th>Drank</th><th>Bak</th><th>Prijs €</th>${gebouwen.map((g) => `<th>${g}</th>`).join("")}</tr>`));
      for (const d of bycat[cat]) {
        const tr = el(`<tr></tr>`);
        tr.appendChild(el(`<td>${d.dranksoort}</td>`));
        const bakTd = el(`<td><input class="bakinput" type="number" min="1" value="${d.flesjes_per_bak}"></td>`);
        bakTd.querySelector("input").addEventListener("change", async (e) => {
          try { await api("/api/beheer/config/bak", { method: "PUT", body: JSON.stringify({ dranksoort: d.dranksoort, flesjes_per_bak: Number(e.target.value || 24) }) }); }
          catch (err) { alert(err.message); }
        });
        tr.appendChild(bakTd);
        const prijsTd = el(`<td><input class="prijsinput" type="number" step="0.01" min="0" value="${d.prijs_per_stuk}"></td>`);
        prijsTd.querySelector("input").addEventListener("change", async (e) => {
          try { await api("/api/beheer/config/prijs", { method: "PUT", body: JSON.stringify({ dranksoort: d.dranksoort, prijs_per_stuk: Number(e.target.value || 0) }) }); }
          catch (err) { alert(err.message); }
        });
        tr.appendChild(prijsTd);
        for (const g of gebouwen) {
          const key = g + "|" + d.dranksoort;
          const huidigeStatus = statusMap[key] || "uit";
          const td = el(`<td><select class="statusselect">
            <option value="uit"${huidigeStatus === "uit" ? " selected" : ""}>Niet aangeboden</option>
            <option value="Frigo"${huidigeStatus === "Frigo" ? " selected" : ""}>Frigo</option>
            <option value="Koelcel"${huidigeStatus === "Koelcel" ? " selected" : ""}>Koelcel</option>
            <option value="Drankberging"${huidigeStatus === "Drankberging" ? " selected" : ""}>Drankberging</option>
          </select></td>`);
          td.querySelector("select").addEventListener("change", async (e) => {
            try { await api("/api/beheer/config/status", { method: "PUT", body: JSON.stringify({ gebouw: g, dranksoort: d.dranksoort, status: e.target.value }) }); }
            catch (err) { alert(err.message); }
          });
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }
      wrapDiv.appendChild(table);
      catBlok.appendChild(wrapDiv);
      houder.appendChild(catBlok);
    }
  } catch (e) { houder.innerHTML = `<div class="info-leeg">Fout: ${e.message}</div>`; }
}

// ---------- Beheer: Gebouwen & zalen ----------
async function paginaGebouwen() {
  const c = $("inhoud");
  paginaKop("Gebouwen & zalen");
  const knop = el(`<button class="knop secundair" style="display:inline-block;padding:9px 16px;margin-bottom:16px">+ Nieuw gebouw</button>`);
  knop.addEventListener("click", async () => {
    const naam = prompt("Naam van het nieuwe gebouw?"); if (!naam) return;
    try { await api("/api/beheer/gebouw", { method: "POST", body: JSON.stringify({ naam }) }); paginaGebouwen(); }
    catch (e) { alert(e.message); }
  });
  c.appendChild(knop);
  const houder = el(`<div id="gebouwen-houder">Laden…</div>`);
  c.appendChild(houder);
  const { gebouwen } = await api("/api/beheer/gebouwen");
  houder.innerHTML = "";
  if (!gebouwen.length) { houder.innerHTML = `<div class="info-leeg">Nog geen gebouwen. Voeg er hierboven een toe.</div>`; return; }
  for (const g of gebouwen) {
    const kaart = el(`<div class="gebouw-kaart">
      <div class="gebouw-kop">
        <div class="gebouw-naam">${g.naam}</div>
        <div class="acties" style="display:flex;gap:6px">
          <button class="mini toevoegen">+ Zaal</button>
          <button class="mini gevaar verwijder">Verwijder</button>
        </div>
      </div>
      <div class="zaal-lijst" id="zalen-${g.id}">Zalen laden…</div>
    </div>`);
    kaart.querySelector(".verwijder").addEventListener("click", async () => {
      if (!confirm(`Gebouw "${g.naam}" en al zijn zalen verwijderen? Dranken die aan dit gebouw gekoppeld waren, blijven wel bewaard.`)) return;
      try { await api("/api/beheer/gebouw", { method: "DELETE", body: JSON.stringify({ id: g.id }) }); paginaGebouwen(); }
      catch (e) { alert(e.message); }
    });
    kaart.querySelector(".toevoegen").addEventListener("click", async () => {
      const naam = prompt(`Naam van de nieuwe zaal in ${g.naam}?`); if (!naam) return;
      try { await api("/api/beheer/zaal", { method: "POST", body: JSON.stringify({ gebouw_id: g.id, naam }) }); laadZalen(g.id, kaart); }
      catch (e) { alert(e.message); }
    });
    houder.appendChild(kaart);
    laadZalen(g.id, kaart);
  }
}
async function laadZalen(gebouw_id, kaart) {
  const houder = kaart.querySelector(`#zalen-${gebouw_id}`);
  const { zalen } = await api("/api/beheer/zalen?gebouw_id=" + gebouw_id);
  houder.innerHTML = "";
  if (!zalen.length) { houder.appendChild(el(`<div class="info-leeg">Nog geen zalen toegevoegd.</div>`)); return; }
  for (const z of zalen) {
    const rij = el(`<div class="zaal-rij"><span>${z.naam}</span><button class="mini gevaar">Verwijder</button></div>`);
    rij.querySelector("button").addEventListener("click", async () => {
      try { await api("/api/beheer/zaal", { method: "DELETE", body: JSON.stringify({ id: z.id }) }); laadZalen(gebouw_id, kaart); }
      catch (e) { alert(e.message); }
    });
    houder.appendChild(rij);
  }
}

function nogTeBouwen() {
  paginaKop("Binnenkort");
  $("inhoud").appendChild(el(`<div class="placeholder">Dit onderdeel bouwen we in een volgende stap.</div>`));
}
